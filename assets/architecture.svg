<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 18px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 15px "Segoe UI", Arial, sans-serif; fill: #1e293b; }
      .note { font: 400 14px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .caption { font: 400 15px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .box { rx: 12; ry: 12; fill: #d9efff; stroke: #58b9ef; stroke-width: 2; }
      .arrow { stroke: #1f2937; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#ffffff"/>
  <text x="640" y="48" text-anchor="middle" class="title">Public Agentic Pipeline for the Envision PSC</text>

  <!-- Left -->
  <rect class="box" x="90" y="355" width="160" height="78"/>
  <text x="170" y="387" text-anchor="middle" class="label">Questions</text>
  <text x="170" y="412" text-anchor="middle" class="body">user queries</text>

  <rect class="box" x="90" y="500" width="160" height="92"/>
  <text x="170" y="533" text-anchor="middle" class="label">Answer Grader</text>
  <text x="170" y="559" text-anchor="middle" class="body">checks final</text>
  <text x="170" y="581" text-anchor="middle" class="body">answer quality</text>

  <rect class="box" x="90" y="650" width="160" height="72"/>
  <text x="170" y="693" text-anchor="middle" class="label">Benchmark</text>

  <!-- Center -->
  <rect class="box" x="330" y="355" width="180" height="78"/>
  <text x="420" y="387" text-anchor="middle" class="label">Planner LLM</text>
  <text x="420" y="412" text-anchor="middle" class="body">chooses next step</text>

  <!-- Tool fanout -->
  <rect class="box" x="610" y="120" width="180" height="78"/>
  <text x="700" y="152" text-anchor="middle" class="label">RAG Tool</text>
  <text x="700" y="177" text-anchor="middle" class="body">semantic retrieval</text>

  <rect class="box" x="610" y="270" width="180" height="78"/>
  <text x="700" y="302" text-anchor="middle" class="label">Grep Tool</text>
  <text x="700" y="327" text-anchor="middle" class="body">exact code patterns</text>

  <rect class="box" x="610" y="420" width="180" height="78"/>
  <text x="700" y="452" text-anchor="middle" class="label">Graph Tool</text>
  <text x="700" y="477" text-anchor="middle" class="body">structural links</text>

  <!-- Right -->
  <rect class="box" x="910" y="170" width="180" height="78"/>
  <text x="1000" y="202" text-anchor="middle" class="label">Distillation</text>
  <text x="1000" y="227" text-anchor="middle" class="body">LLM</text>

  <rect class="box" x="910" y="355" width="180" height="78"/>
  <text x="1000" y="387" text-anchor="middle" class="label">Main LLM</text>
  <text x="1000" y="412" text-anchor="middle" class="body">drafts the answer</text>

  <rect class="box" x="910" y="555" width="180" height="78"/>
  <text x="1000" y="587" text-anchor="middle" class="label">Final Answer</text>
  <text x="1000" y="612" text-anchor="middle" class="body">evidence-based output</text>

  <!-- arrows -->
  <path class="arrow" d="M250 394 L330 394"/>

  <path class="arrow" d="M510 394 L610 159"/>
  <path class="arrow" d="M510 394 L610 309"/>
  <path class="arrow" d="M510 394 L610 459"/>

  <path class="arrow" d="M790 159 L910 209"/>
  <path class="arrow" d="M790 309 L910 209"/>
  <path class="arrow" d="M790 459 L910 209"/>

  <path class="arrow" d="M1000 248 L1000 355"/>
  <path class="arrow" d="M910 394 L510 394"/>
  <path class="arrow" d="M420 433 L420 594 L910 594"/>
  <path class="arrow" d="M910 594 L250 546"/>
  <path class="arrow" d="M170 592 L170 650"/>

  <!-- notes -->
  <text x="555" y="244" text-anchor="middle" class="note">first pass or</text>
  <text x="555" y="264" text-anchor="middle" class="note">unsatisfactory answer</text>

  <text x="650" y="380" text-anchor="middle" class="note">feedback loop to Planner LLM</text>
  <text x="445" y="535" text-anchor="middle" class="note">else</text>

  <text x="640" y="735" text-anchor="middle" class="caption">The planner can branch toward RAG, Grep, or Graph, distill the collected evidence, and loop until the main model can produce a grounded final answer.</text>
</svg>
