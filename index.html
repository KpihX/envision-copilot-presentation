<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PSC INF01 X24 : LLM for Information Extraction in a DSL : Case of Envision (LOKAD)</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Envision Copilot PSC Presentation Site">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />
  <style>
    .sidebar { display: flex !important; flex-direction: column !important; background-color: var(--sidebar-background) !important; }
    .app-name { order: 1 !important; margin-top: 20px !important; font-weight: bold !important; font-size: 1.2rem !important; text-align: center !important; }
    .search { order: 2 !important; margin-bottom: 20px !important; }
    .sidebar-nav { order: 3 !important; flex: 1 !important; }
    
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-repeat: no-repeat;
      background-position: center;
      background-size: 60%;
      opacity: 0.1;
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'PSC INF01 X24',
      repo: 'https://github.com/KpihX/envision-copilot-presentation',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      themeColor: '#007acc',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results.',
        depth: 6
      },
      darklightTheme: {
        defaultTheme: 'dark'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <script>
    // Function to normalize a path by resolving ../ and ./
    function normalizePath(path) {
      const parts = path.split('/');
      const normalized = [];
      
      for (let part of parts) {
        if (part === '..' && normalized.length > 0) {
          normalized.pop(); // Go up one directory
        } else if (part !== '.' && part !== '') {
          normalized.push(part);
        }
      }
      
      return normalized.join('/');
    }
    
    // Intercept link clicks to fix relative paths in symlinked markdown files
    document.addEventListener('click', function(e) {
      if (e.target.tagName === 'A') {
        const href = e.target.getAttribute('href');
        
        // Skip absolute paths, external links, and mailto links - these work as-is
        if (!href || href.startsWith('/') || href.startsWith('http') || href.startsWith('mailto:')) {
          return;
        }
        
        // Skip section links (they have query parameters like ?id=overview)
        if (href.includes('?')) {
          return;
        }
        
        // Get current path from location hash
        const currentHash = window.location.hash;
        const currentPath = currentHash.replace(/^#\//, '').split('?')[0]; // Remove # and query params
        const currentDir = currentPath.substring(0, currentPath.lastIndexOf('/'));
        
        // Handle links that start with #/ (already processed by Docsify)
        if (href.startsWith('#/')) {
          const linkPath = href.replace(/^#\//, '');
          
          // Try to fetch the page - if it fails, we'll apply the path fix
          e.preventDefault();
          e.stopPropagation();
          
          fetch(linkPath + '.md')
            .then(response => {
              if (response.ok) {
                // Page exists, navigate normally
                window.location.hash = href;
                setTimeout(() => window.scrollTo(0, 0), 100);
              } else {
                // Page not found, try fixing the path
                if (currentDir && !linkPath.startsWith(currentDir + '/')) {
                  let correctedPath = currentDir + '/' + linkPath;
                  correctedPath = normalizePath(correctedPath);
                  
                  // Try the corrected path
                  fetch(correctedPath + '.md')
                    .then(correctedResponse => {
                      if (correctedResponse.ok) {
                        window.location.hash = '#/' + correctedPath;
                        setTimeout(() => window.scrollTo(0, 0), 100);
                      } else {
                        // Corrected path also doesn't exist, show not found page
                        window.location.hash = '#/not-found';
                        setTimeout(() => window.scrollTo(0, 0), 100);
                      }
                    })
                    .catch(() => {
                      window.location.hash = '#/not-found';
                      setTimeout(() => window.scrollTo(0, 0), 100);
                    });
                } else {
                  // Can't fix path, show not found page
                  window.location.hash = '#/not-found';
                  setTimeout(() => window.scrollTo(0, 0), 100);
                }
              }
            })
            .catch(() => {
              // Network error or fetch not available, try fixing path as fallback
              if (currentDir && !linkPath.startsWith(currentDir + '/')) {
                let correctedPath = currentDir + '/' + linkPath;
                correctedPath = normalizePath(correctedPath);
                
                fetch(correctedPath + '.md')
                  .then(correctedResponse => {
                    if (correctedResponse.ok) {
                      window.location.hash = '#/' + correctedPath;
                      setTimeout(() => window.scrollTo(0, 0), 100);
                    } else {
                      window.location.hash = '#/not-found';
                      setTimeout(() => window.scrollTo(0, 0), 100);
                    }
                  })
                  .catch(() => {
                    window.location.hash = '#/not-found';
                    setTimeout(() => window.scrollTo(0, 0), 100);
                  });
              } else {
                window.location.hash = '#/not-found';
                setTimeout(() => window.scrollTo(0, 0), 100);
              }
            });
          
          return false;
        }
        // Handle original relative links (e.g., ./file.md, ../file.md)
        else if (!href.startsWith('#')) {
          e.preventDefault();
          e.stopPropagation();
          
          // Calculate absolute path
          let absolutePath = currentDir ? currentDir + '/' + href : href;
          absolutePath = normalizePath(absolutePath);
          
          // Try to fetch to verify path works
          fetch(absolutePath)
            .then(response => {
              if (response.ok) {
                window.location.hash = '#/' + absolutePath.replace(/\.md$/, '');
                setTimeout(() => window.scrollTo(0, 0), 100);
              } else {
                // File not found, show not found page
                window.location.hash = '#/not-found';
                setTimeout(() => window.scrollTo(0, 0), 100);
              }
            })
            .catch(() => {
              window.location.hash = '#/not-found';
              setTimeout(() => window.scrollTo(0, 0), 100);
            });
          
          return false;
        }
      }
    }, true);
  </script>
</body>
</html>
